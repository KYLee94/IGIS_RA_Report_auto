<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>IGIS Real Asset DecisionOS — Refined Deck</title>
<style>

:root {
  --bg: #f3f1ec;
  --paper: #fbfaf7;
  --panel: #ffffff;
  --ink: #18191c;
  --sub: #5f6674;
  --line: #d7d3cb;
  --line-strong: #b7b2a8;
  --navy: #18243f;
  --blue: #2f66d5;
  --gold: #a96c1b;
  --red: #9c2f2f;
  --green: #3f6e59;
  --shadow: 0 10px 28px rgba(24,25,28,0.06);
  --radius: 18px;
  --radius-sm: 12px;
  --page-w: 1320px;
  --page-h: 820px;
  --header-h: 72px;
  --hero-h: 104px;
  --font: "Pretendard Variable","Pretendard","Inter","Apple SD Gothic Neo","Malgun Gothic",system-ui,sans-serif;
}
* { box-sizing: border-box; }
html, body { margin: 0; padding: 0; background: var(--bg); color: var(--ink); font-family: var(--font); height: 100%; }
body { overflow: hidden; }
button { font: inherit; }
.app {
  min-height: 100vh;
  display: grid;
  grid-template-rows: var(--header-h) 1fr;
}
.topbar {
  display: grid;
  grid-template-columns: 280px 1fr 220px;
  align-items: center;
  gap: 24px;
  padding: 0 28px;
  border-bottom: 1px solid var(--line);
  background: rgba(251,250,247,0.94);
  backdrop-filter: blur(12px);
}
.brand small {
  display: block;
  font-size: 12px;
  color: var(--sub);
  letter-spacing: .08em;
  text-transform: uppercase;
  margin-bottom: 6px;
}
.brand strong {
  display: block;
  font-size: 20px;
  font-weight: 700;
  color: var(--navy);
}
.section-tabs {
  display: flex;
  gap: 10px;
  justify-content: center;
  flex-wrap: wrap;
}
.section-tab {
  border: 1px solid transparent;
  background: transparent;
  color: var(--sub);
  padding: 9px 12px;
  border-radius: 999px;
  cursor: pointer;
  font-size: 13px;
}
.section-tab.active {
  background: rgba(24,36,63,.08);
  color: var(--navy);
  border-color: rgba(24,36,63,.12);
  font-weight: 700;
}
.topmeta {
  justify-self: end;
  display: flex;
  align-items: center;
  gap: 12px;
  color: var(--sub);
  font-size: 13px;
}
.stage {
  display: grid;
  place-items: center;
  padding: 22px 24px 18px;
}
.page {
  width: min(var(--page-w), calc(100vw - 48px));
  height: min(var(--page-h), calc(100vh - var(--header-h) - 40px));
  background: var(--paper);
  border: 1px solid var(--line);
  border-radius: 24px;
  box-shadow: var(--shadow);
  display: grid;
  grid-template-rows: auto 1fr auto;
  overflow: hidden;
}
.page-top {
  padding: 28px 34px 22px;
  border-bottom: 1px solid var(--line);
  background:
    linear-gradient(180deg, rgba(255,255,255,.72), rgba(255,255,255,0) 65%);
}
.page-index {
  font-size: 12px;
  letter-spacing: .12em;
  text-transform: uppercase;
  color: var(--sub);
  margin-bottom: 10px;
}
.page-title {
  font-size: 50px;
  line-height: 1.04;
  letter-spacing: -.03em;
  font-weight: 750;
  margin: 0 0 10px;
  color: var(--navy);
}
.page-head {
  font-size: 24px;
  line-height: 1.34;
  font-weight: 650;
  margin: 0 0 8px;
  max-width: 1020px;
}
.page-sub {
  font-size: 16px;
  line-height: 1.55;
  color: var(--sub);
  max-width: 1020px;
}
.page-body {
  min-height: 0;
  padding: 24px 34px 26px;
  overflow: hidden;
}
.page-footer {
  display: grid;
  grid-template-columns: 1fr auto 1fr;
  align-items: center;
  gap: 20px;
  border-top: 1px solid var(--line);
  padding: 14px 24px;
  background: rgba(255,255,255,.72);
}
.nav-left, .nav-right { display: flex; align-items: center; gap: 10px; }
.nav-right { justify-content: end; }
.nav-center {
  text-align: center;
  display: flex;
  flex-direction: column;
  gap: 8px;
  align-items: center;
}
.nav-btn {
  border: 1px solid var(--line);
  background: white;
  color: var(--navy);
  width: 42px; height: 42px;
  border-radius: 999px;
  cursor: pointer;
}
.nav-btn:hover { border-color: var(--navy); }
.counter { font-size: 13px; color: var(--sub); }
.dots { display: flex; gap: 6px; flex-wrap: wrap; justify-content: center; }
.dot { width: 7px; height: 7px; border-radius: 999px; background: #d8d4cb; cursor: pointer; }
.dot.active { width: 24px; background: var(--navy); }

.kicker {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  font-size: 12px;
  color: var(--sub);
  text-transform: uppercase;
  letter-spacing: .08em;
}
.kicker::before {
  content:"";
  width: 28px;
  height: 1px;
  background: var(--line-strong);
}

.build-grid-hero {
  display: grid;
  grid-template-columns: 1.15fr .85fr;
  gap: 22px;
  height: 100%;
}
.build-grid-2 {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 22px;
  height: 100%;
}
.build-grid-3 {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 18px;
  height: 100%;
}
.build-grid-4 {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 16px;
  height: 100%;
}
.story-panel, .data-panel {
  background: var(--panel);
  border: 1px solid var(--line);
  border-radius: var(--radius);
  padding: 22px 22px 20px;
  min-height: 0;
  overflow: hidden;
}
.story-panel.dark {
  background: var(--navy);
  color: white;
  border-color: transparent;
}
.story-panel.dark .panel-title,
.story-panel.dark .panel-body,
.story-panel.dark .mini,
.story-panel.dark li {
  color: white;
}
.panel-title {
  font-size: 21px;
  font-weight: 700;
  margin: 0 0 14px;
  line-height: 1.25;
}
.panel-title.small { font-size: 18px; }
.panel-body, .story-panel p, .story-panel li {
  font-size: 14px;
  line-height: 1.6;
  color: var(--sub);
  margin: 0;
}
.story-panel ul {
  margin: 0;
  padding-left: 18px;
  display: grid;
  gap: 10px;
}
.mini { font-size: 12px; color: var(--sub); line-height: 1.55; margin-top: 10px; }
.em {
  color: var(--navy);
  font-weight: 800;
}
.em.blue { color: var(--blue); }
.em.gold { color: var(--gold); }
.em.red { color: var(--red); }

.product-shell {
  height: 100%;
  display: grid;
  grid-template-rows: auto var(--hero-h) 1fr auto;
  gap: 18px;
}
.toolbar {
  display: flex;
  gap: 10px;
  flex-wrap: wrap;
  align-items: center;
  justify-content: space-between;
  font-size: 13px;
  color: var(--sub);
}
.toolbar-left, .toolbar-right {
  display: flex;
  align-items: center;
  gap: 10px;
  flex-wrap: wrap;
}
.chip {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 7px 10px;
  border: 1px solid var(--line);
  border-radius: 999px;
  background: white;
  font-size: 12px;
  color: var(--sub);
}
.chip.dark { background: rgba(24,36,63,.08); color: var(--navy); border-color: rgba(24,36,63,.12); }
.hero-row {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 14px;
}
.hero-card {
  background: white;
  border: 1px solid var(--line);
  border-radius: 18px;
  padding: 16px 16px 14px;
  cursor: pointer;
  display: grid;
  grid-template-rows: auto 1fr auto;
  gap: 10px;
  transition: transform .18s ease, border-color .18s ease, box-shadow .18s ease;
}
.hero-card:hover {
  transform: translateY(-1px);
  border-color: rgba(24,36,63,.22);
  box-shadow: 0 10px 22px rgba(24,25,28,.08);
}
.context-bar {
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
  font-size: 11px;
  color: var(--sub);
}
.context-pill {
  border: 1px solid var(--line);
  padding: 5px 8px;
  border-radius: 999px;
  background: #fff;
}
.status {
  border-color: transparent;
  font-weight: 700;
}
.status.red { background: rgba(156,47,47,.08); color: var(--red); }
.status.amber { background: rgba(169,108,27,.10); color: var(--gold); }
.status.green { background: rgba(63,110,89,.10); color: var(--green); }
.hero-title {
  font-size: 18px;
  line-height: 1.28;
  font-weight: 720;
  letter-spacing: -.02em;
}
.hero-note {
  font-size: 12px;
  color: var(--sub);
  display: flex;
  justify-content: space-between;
  gap: 12px;
}
.trend.up { color: var(--gold); font-weight: 700; }
.trend.down { color: var(--red); font-weight: 700; }
.trend.flat { color: var(--sub); font-weight: 700; }

.section-label {
  font-size: 12px;
  text-transform: uppercase;
  letter-spacing: .08em;
  color: var(--sub);
  margin-bottom: 10px;
}
.sample-grid.dashboard {
  display: grid;
  grid-template-columns: 3fr 5fr 4fr;
  gap: 16px;
  min-height: 0;
}
.sample-grid.alert {
  display: grid;
  grid-template-columns: 3fr 5fr 4fr;
  gap: 16px;
}
.sample-grid.compare {
  display: grid;
  grid-template-columns: 8fr 4fr;
  gap: 16px;
}
.sample-grid.graph {
  display: grid;
  grid-template-columns: 3fr 6fr 3fr;
  gap: 16px;
}
.sample-grid.war {
  display: grid;
  grid-template-columns: 3fr 6fr 3fr;
  gap: 16px;
}
.bottom-grid.two {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 16px;
  margin-top: 16px;
}
.bottom-grid.three {
  display: grid;
  grid-template-columns: 1fr 1fr 1fr;
  gap: 16px;
  margin-top: 16px;
}
.data-panel {
  display: flex;
  flex-direction: column;
}
.data-panel .panel-body-wrap {
  min-height: 0;
  overflow: auto;
  padding-right: 4px;
}
.metric-strip {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 12px;
}
.metric-box {
  border: 1px solid var(--line);
  border-radius: 14px;
  padding: 14px;
  background: #fcfbf8;
}
.metric-label { font-size: 12px; color: var(--sub); margin-bottom: 8px; }
.metric-value { font-size: 24px; line-height: 1.1; font-weight: 760; letter-spacing: -.02em; color: var(--navy); }
.metric-meta { font-size: 12px; color: var(--sub); margin-top: 8px; }

.rag-list, .feed-list, .bullet-list, .rank-list, .card-stack, .timeline-list {
  display: grid;
  gap: 10px;
}
.rag-item, .feed-item, .rank-item, .mini-card, .alert-item, .timeline-item {
  border: 1px solid var(--line);
  border-radius: 14px;
  padding: 12px 13px;
  background: #fff;
}
.rag-top {
  display:flex; justify-content:space-between; gap:10px; align-items:flex-start;
}
.rag-name, .rank-name, .feed-title, .mini-title, .alert-title {
  font-size: 15px; line-height: 1.35; font-weight: 700;
}
.rag-meta, .rank-note, .feed-meta, .mini-meta, .timeline-body, .table-note {
  font-size: 12px; color: var(--sub); line-height: 1.55;
}
.feed-body, .mini-body, .alert-row span, .timeline-body, .bullet-list li {
  font-size: 13px; line-height: 1.6; color: var(--sub);
}
.alert-stack { display:grid; gap:12px; }
.alert-row {
  display:grid; grid-template-columns: 86px 1fr; gap:10px;
  align-items:start; margin-top:8px;
}
.alert-row strong { font-size: 12px; color: var(--navy); }
.alert-meta { margin-top: 10px; font-size: 11px; color: var(--sub); }

.table-wrap {
  width: 100%;
  overflow: auto;
  border: 1px solid var(--line);
  border-radius: 14px;
}
table {
  width: 100%;
  border-collapse: collapse;
  background: white;
}
th, td {
  padding: 11px 12px;
  border-bottom: 1px solid var(--line);
  text-align: left;
  vertical-align: top;
  font-size: 13px;
  line-height: 1.45;
}
th {
  font-size: 12px;
  color: var(--sub);
  text-transform: uppercase;
  letter-spacing: .05em;
  background: #f7f5f0;
  position: sticky;
  top: 0;
}
tr:last-child td { border-bottom: none; }

.rank-item {
  display: grid;
  grid-template-columns: auto 1fr;
  gap: 12px;
  align-items: start;
}
.rank-val {
  font-size: 18px;
  font-weight: 800;
  min-width: 78px;
  color: var(--navy);
}
.rank-val.up { color: var(--gold); }
.rank-val.down { color: var(--red); }

.bullet-list {
  padding-left: 18px;
  margin: 0;
}
.bullet-list li { margin: 0; }

.bar-list {
  display: grid;
  gap: 12px;
}
.bar-row { display:grid; gap:8px; }
.bar-meta {
  display:flex; justify-content:space-between; align-items:center; gap:10px;
  font-size:13px;
}
.bar-track {
  height: 10px; border-radius: 999px; background:#ece8df; overflow:hidden;
}
.bar-fill { height:100%; border-radius:999px; background: var(--navy); }
.bar-fill.up { background: var(--gold); }
.bar-fill.down { background: var(--red); }

.heatmap {
  display:grid;
  gap: 8px;
}
.heat-row {
  display:grid;
  grid-template-columns: 110px repeat(auto-fit, minmax(72px,1fr));
  gap: 6px;
}
.heat-cell, .heat-head, .heat-label {
  border: 1px solid var(--line);
  border-radius: 10px;
  padding: 9px 10px;
  font-size: 12px;
}
.heat-head { background:#f7f5f0; color: var(--sub); }
.heat-label { background:#fff; color: var(--navy); font-weight:700; }
.heat-cell.red { background: rgba(156,47,47,.08); color: var(--red); }
.heat-cell.amber { background: rgba(169,108,27,.10); color: var(--gold); }
.heat-cell.green { background: rgba(63,110,89,.10); color: var(--green); }

.graph-wrap {
  height: 100%;
  min-height: 280px;
  border: 1px solid var(--line);
  border-radius: 18px;
  background: #fff;
  position: relative;
  overflow: hidden;
}
.graph-svg {
  width: 100%;
  height: 100%;
  display:block;
}
.graph-svg line { stroke: #c9c3b8; stroke-width: 1.2; }
.node-person circle { fill: var(--navy); }
.node-project circle { fill: var(--blue); }
.node-party circle { fill: var(--gold); }
.graph-svg text {
  font-family: var(--font);
  font-size: 11px;
  fill: var(--ink);
}

.page-fade {
  animation: fadeIn .28s ease;
}
@keyframes fadeIn {
  from { opacity: 0; transform: translateY(6px); }
  to { opacity: 1; transform: translateY(0); }
}

.modal {
  position: fixed;
  inset: 0;
  background: rgba(12,14,18,.42);
  display: none;
  align-items: center;
  justify-content: center;
  padding: 24px;
  z-index: 20;
}
.modal.open { display: flex; }
.modal-card {
  width: min(880px, 100%);
  max-height: min(720px, calc(100vh - 48px));
  background: var(--paper);
  border: 1px solid var(--line);
  border-radius: 24px;
  box-shadow: 0 24px 80px rgba(0,0,0,.18);
  display: grid;
  grid-template-rows: auto 1fr auto;
  overflow: hidden;
}
.modal-head {
  padding: 22px 24px 18px;
  border-bottom: 1px solid var(--line);
}
.modal-title {
  font-size: 28px;
  line-height: 1.2;
  margin: 0 0 8px;
  color: var(--navy);
}
.modal-sub {
  font-size: 14px;
  color: var(--sub);
  line-height: 1.55;
}
.modal-body {
  overflow: auto;
  padding: 18px 24px 22px;
  display: grid;
  gap: 16px;
}
.modal-foot {
  padding: 14px 24px;
  border-top: 1px solid var(--line);
  display: flex;
  justify-content: flex-end;
}
.close-btn {
  border: 1px solid var(--line);
  background: #fff;
  color: var(--navy);
  padding: 9px 14px;
  border-radius: 999px;
  cursor: pointer;
}
.detail-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 16px;
}
.detail-block {
  border: 1px solid var(--line);
  border-radius: 16px;
  padding: 14px;
  background: #fff;
}
.detail-block h4 {
  margin: 0 0 10px;
  font-size: 16px;
}
.detail-block ul {
  margin: 0;
  padding-left: 18px;
  display: grid;
  gap: 8px;
}
.detail-block li {
  font-size: 13px;
  color: var(--sub);
  line-height: 1.55;
}
.project-bar {
  display:flex; gap:8px; flex-wrap:wrap; margin-bottom: 10px;
}
.project-tag {
  font-size: 11px;
  border: 1px solid var(--line);
  padding: 5px 8px;
  border-radius: 999px;
  color: var(--sub);
  background: white;
}

.hidden-tools {
  display:none !important;
}

@media (max-width: 1320px) {
  .page-title { font-size: 42px; }
  .page-head { font-size: 22px; }
  .hero-row { grid-template-columns: 1fr; }
  .sample-grid.dashboard, .sample-grid.alert, .sample-grid.graph, .sample-grid.war, .build-grid-4, .build-grid-3, .build-grid-2, .build-grid-hero {
    grid-template-columns: 1fr;
  }
  .sample-grid.compare { grid-template-columns: 1fr; }
  .metric-strip { grid-template-columns: 1fr; }
  .detail-grid { grid-template-columns: 1fr; }
  body { overflow: auto; }
  .page { height: auto; min-height: calc(100vh - var(--header-h) - 40px); }
}

/* ----- refined overrides v2 ----- */
:root {
  --radius: 0px;
  --radius-sm: 0px;
  --shadow: 0 8px 18px rgba(24,25,28,0.04);
}
.page,
.story-panel,
.data-panel,
.hero-card,
.metric-box,
.rag-item,
.feed-item,
.rank-item,
.mini-card,
.alert-item,
.timeline-item,
.table-wrap,
.heat-cell,
.heat-head,
.heat-label,
.graph-wrap,
.modal-card,
.detail-block,
.project-tag,
.nav-btn,
.dot,
.context-pill,
.chip,
.bar-track,
.bar-fill,
.close-btn {
  border-radius: 0 !important;
}
.page-title {
  font-size: 36px !important;
  line-height: 1.14 !important;
  letter-spacing: -0.02em !important;
  margin: 0 0 10px !important;
}
.page-head, .page-sub { display: none !important; }
.page-bullets {
  display: grid;
  gap: 6px;
  max-width: 1080px;
  margin-top: 6px;
}
.page-bullet {
  position: relative;
  padding-left: 16px;
  font-size: 15px;
  line-height: 1.55;
  color: var(--sub);
}
.page-bullet::before {
  content: "•";
  position: absolute;
  left: 0;
  top: 0;
  color: var(--navy);
  font-weight: 700;
}
.page-body {
  overflow: auto !important;
  padding: 22px 30px 24px !important;
}
.page-top {
  padding: 24px 30px 18px !important;
}
.product-shell {
  grid-template-rows: auto auto auto auto !important;
  gap: 16px !important;
}
.section-label {
  font-size: 13px !important;
  font-weight: 700 !important;
  letter-spacing: 0 !important;
  text-transform: none !important;
  color: var(--navy) !important;
  margin-bottom: 8px !important;
}
.sample-grid.dashboard,
.sample-grid.alert,
.sample-grid.compare,
.sample-grid.graph,
.sample-grid.war,
.build-grid-4,
.build-grid-3,
.build-grid-2,
.build-grid-hero,
.bottom-grid.two,
.bottom-grid.three {
  align-items: start;
}
.sample-grid.dashboard > div,
.sample-grid.alert > div,
.sample-grid.compare > div,
.sample-grid.graph > div,
.sample-grid.war > div,
.bottom-grid.two > *,
.bottom-grid.three > * {
  min-width: 0;
}
.data-panel {
  min-width: 0;
}
.data-panel .panel-body-wrap {
  overflow: auto;
}
.hero-card {
  padding: 14px 14px 12px !important;
  box-shadow: none !important;
}
.hero-card:hover {
  transform: none !important;
  box-shadow: none !important;
}
.context-bar {
  gap: 6px !important;
}
.context-pill {
  padding: 4px 7px !important;
  font-size: 10px !important;
}
.hero-title {
  font-size: 16px !important;
  line-height: 1.34 !important;
}
.hero-note {
  font-size: 12px !important;
}
.metric-value {
  font-size: 21px !important;
}
.rank-val {
  font-size: 16px !important;
  min-width: 70px !important;
}
.panel-title {
  font-size: 18px !important;
  margin-bottom: 10px !important;
}
.panel-title.small {
  font-size: 17px !important;
}
.feed-title, .mini-title, .alert-title, .rag-name {
  font-size: 14px !important;
}
.table-wrap {
  max-height: 262px;
}
.build-flow {

const deckData = [{"id": "page-02", "section": "글로벌 벤치마크", "title": "글로벌 선도사는 AI를 채팅창이 아니라 업무 흐름에 붙였습니다", "head": "글로벌 선도사는 질문창을 하나 더 만든 것이 아니라, 회의·리서치·자산 판단 같은 기존 업무 흐름 안에 AI를 붙였습니다.", "sub": "이지스도 기능 나열보다 배치가 중요합니다. 어떤 화면에서, 어떤 데이터와 규칙 위에서, 누구에게 먼저 보여줄지를 기준으로 설계해야 합니다.", "kind": "build", "layout": "columns4", "blocks": [{"title": "플랫폼형", "content": "<p><strong>JPMorgan Chase</strong><br><strong>BNY</strong></p><p>권한, 감사, 허용 범위를 먼저 정의하고 전사 AI 환경을 안전하게 확산한 유형입니다.</p><p class='mini'>시사점: 이지스도 단일 챗봇보다 <strong>권한과 기록이 남는 운영 화면</strong>이 먼저입니다.</p>"}, {"title": "업무흐름형", "content": "<p><strong>Morgan Stanley</strong><br><strong>Bank of America</strong></p><p>회의 준비, 요약, follow-up, 메모 정리처럼 반복 업무를 먼저 줄였습니다.</p><p class='mini'>시사점: 조직장 화면에는 <strong>아침 브리프와 바로 물을 질문</strong>이 먼저 나와야 합니다.</p>"}, {"title": "역할특화형", "content": "<p><strong>Citi</strong><br><strong>DBS</strong></p><p>모든 사용자에게 같은 화면을 주지 않고, 역할별 workspace와 질문 체계를 따로 제공했습니다.</p><p class='mini'>시사점: 부문대표, 투자총괄, 사업그룹장, 론파이낸스센터(LFC)장이 보는 첫 화면은 달라야 합니다.</p>"}, {"title": "자산판단형", "content": "<p><strong>BlackRock</strong><br><strong>JLL</strong><br><strong>CBRE</strong></p><p>자산, 포트폴리오, 외부 신호를 한 화면에서 연결해 판단하게 만들었습니다.</p><p class='mini'>시사점: 뉴스는 기사 피드가 아니라 <strong>프로젝트 relevance 보드</strong>로 재구성돼야 합니다.</p>"}]}, {"id": "page-04", "section": "옵션 구조", "title": "페이지는 하나가 아니라, 질문이 다른 조직장별 화면군으로 구성해야 합니다", "head": "같은 프레임을 쓰더라도, 조직마다 먼저 보는 질문과 데이터 조합은 달라야 합니다.", "sub": "운영형, 알림형, 비교형, 포털형, 관계도형, 워룸형처럼 화면 문법을 나눠야 각 페이지가 무엇을 설명하는지 선명해집니다.", "kind": "build", "layout": "columns2", "blocks": [{"title": "공통 화면 문법", "content": "<ul><li><strong>운영형</strong> — 경제성, 순위, 단계 상태, 수수료 하방을 같이 보는 화면</li><li><strong>이슈 알림형</strong> — 이슈 피드, 뉴스, 최근 접점, 다음 액션을 먼저 보여주는 화면</li><li><strong>기준 비교형</strong> — 초기 기준, 심의 기준, 현재값을 비교하는 화면</li><li><strong>포털형</strong> — 상단 톱이슈와 랭킹, 섹터 모듈을 빠르게 훑는 화면</li><li><strong>관계도형</strong> — 담당자, 프로젝트, 거래상대방 연결을 시각화한 화면</li><li><strong>워룸형</strong> — 책임자, 마감선, 구조 변경 판단을 잠그는 화면</li></ul>"}, {"title": "조직장별 질문 예시", "content": "<ul><li><strong>부문대표</strong> — 이번 주 직접 개입해야 할 적색 이슈 3건은 무엇인가</li><li><strong>투자그룹장</strong> — 이 딜은 지금 IC에 올려도 되는가</li><li><strong>사업그룹장</strong> — 어느 단계에서 어떤 업무가 누락됐는가</li><li><strong>론파이낸스센터(LFC)장</strong> — 이자비용과 분배재원 압박은 어디서 커지는가</li><li><strong>기업마케팅센터(EMC)</strong> — 어떤 거래상대방에 이번 주 미팅을 먼저 배치해야 하는가</li></ul>"}]}, {"id": "page-05", "section": "읽는 법", "title": "샘플 화면은 위에서 아래로 읽히게 설계합니다", "head": "상단은 오늘 먼저 봐야 할 알림, 중단은 판단 근거가 되는 핵심 데이터, 하단은 참고 맥락과 추가 액션으로 읽히게 맞춥니다.", "sub": "샘플 화면은 정보를 많이 보여주는 것이 목표가 아니라, 조직장이 지금 무엇을 먼저 보고 어떤 질문을 던져야 하는지 바로 잡아주는 것이 목표입니다.", "kind": "build", "layout": "flow", "blocks": [{"title": "상단", "content": "<p><strong>먼저 볼 것 3개</strong>만 카드뉴스처럼 짧게 보여줍니다. 카드 클릭 시 프로젝트 현황, 관련 수치, 사내·외 이슈, 담당조직과 다음 액션이 모달로 열립니다.</p>"}, {"title": "중단", "content": "<p><strong>판단에 필요한 핵심 데이터</strong>만 남깁니다. 언더라이팅 대비 변화, 단계 RAG, 월간 economics, 관련 뉴스처럼 이 페이지의 결정을 뒷받침하는 근거를 배치합니다.</p>"}, {"title": "하단", "content": "<p><strong>관련 맥락과 후속 업무</strong>를 붙입니다. 유사 프로젝트, 최근 사내 이슈, 확인해야 할 업무를 모아 지금 당장 해야 할 다음 행동으로 연결합니다.</p>"}]}, {"id": "page-06", "section": "샘플 화면", "title": "부문 운영 컨트롤타워", "head": "이번 주 직접 개입해야 할 Red 3건과 반기 보수 하방 2건을 한 화면에서 판단합니다.", "sub": "월간 경제성, 프로젝트 단계, 누락 액션, 공실과 수수료 하방을 함께 보는 부문대표 화면입니다.", "kind": "sample", "template": "dashboard", "alerts": [{"project": "고양 데이터센터 개발안", "org": "개발솔루션센터(DSC)", "owner": "김도현", "status": "Red", "title": "인허가 제출 1건 미완료 · 예정일 6일 경과", "note": "Stage 2 지연 · 오늘 결재 필요", "trend": "▼ 6일", "details": ["필수 인허가 제출이 2026.04.03 예정이었으나 미완료 상태입니다.", "담당자 공백이 있어 현재는 개발솔루션센터(DSC) 검토만 진행 중입니다.", "오늘 내 owner 재지정과 제출 일정 재산정이 필요합니다."], "related": ["관련 뉴스: 수도권 전력·인허가 병목 기사 1건", "사내 이슈: 프로젝트 승인 메모 업데이트 미반영"], "history": ["2025년 하반기 부지 확보 이후 전력 인입 조건을 전제로 초기 사업계획이 수립되었습니다.", "2026년 1분기 들어 수도권 전력·인허가 병목이 커지면서 예정 제출 일정이 지연되기 시작했습니다.", "이번 주 부문대표 화면은 인허가 지연, 오피스 포트폴리오의 월 이자비용 상승, 상반기 보수 전망 하방을 한 장에서 같이 보게 설계했습니다."], "checks": ["오늘 owner 재지정이 필요한 안건 1건 확정", "보수 하방이 큰 2건을 대표 보고용 문장으로 정리"], "story": "고양 데이터센터 개발안는 최근 내부 데이터와 외부 신호가 동시에 변화한 대표 사 function stashDetail(detail) {
  const key = `d-${++detailCounter}`;
  detailStore[key] = detail;
  return key;
}

function renderTag(type, label) {
  const classes = ["context-pill", "tag-chip", `tag-${type}`].join(" ");
  return `<button type="button" class="${classes}" data-tag-type="${esc(type)}" data-tag-value="${esc(label)}">${esc(label)}</button>`;
}

function renderStaticPill(type, label) {
  return `<span class="context-pill status ${type}">${esc(label)}</span>`;
}

function renderContextBar(detail) {
  const orgTags = splitOrgTags(detail.org || "").map(org => renderTag("org", org)).join("");
  return `
    <div class="context-bar">
      ${detail.project ? renderTag("project", detail.project) : ""}
      ${orgTags}
      ${detail.owner && detail.owner !== "공백" ? renderTag("person", detail.owner) : `<span class="context-pill tag-chip tag-person">담당 공백</span>`}
      ${renderStaticPill((detail.status || "Amber").toLowerCase().includes("red") ? "red" : (detail.status || "").toLowerCase().includes("amber") ? "amber" : "green", detail.status || "참고")}
    </div>`;
}

function renderSectionTabs() {
  const container = document.getElementById("sectionTabs");
  container.innerHTML = "";
  state.sections.forEach(section => {
    const firstIndex = deckData.findIndex(p => p.section === section);
    const btn = document.createElement("button");
    btn.className = "section-tab" + (deckData[state.index].section === section ? " active" : "");
    btn.textContent = section;
    btn.addEventListener("click", () => goTo(firstIndex));
    container.appendChild(btn);
  });
}

function renderFooterNav() {
  return `
    <div class="page-footer">
      <div class="nav-left">
        <button class="nav-btn" id="prevBtn" aria-label="이전 페이지">←</button>
        <span class="counter">이전</span>
      </div>
      <div class="nav-center">
        <div class="counter">${String(state.index+1).padStart(2,"0")} / ${String(deckData.length).padStart(2,"0")}</div>
        <div class="dots">
          ${deckData.map((_,i)=>`<span class="dot ${i===state.index ? 'active' : ''}" data-dot="${i}"></span>`).join("")}
        </div>
      </div>
      <div class="nav-right">
        <span class="counter">다음</span>
        <button class="nav-btn" id="nextBtn" aria-label="다음 페이지">→</button>
      </div>
    </div>`;
}

function renderPageHeader(page) {
  const current = String(state.index + 1).padStart(2, "0");
  const total = String(deckData.length).padStart(2, "0");
  return `
    <div class="page-top">
      <div class="page-index">${current} / ${total}</div>
      <h1 class="page-title">${esc(page.title)}</h1>
      <div class="page-bullets">
        <div class="page-bullet">${page.head}</div>
        <div class="page-bullet">${page.sub}</div>
      </div>
    </div>`;
}

function renderBuildPage(page) {
  if (page.layout === "flow") {
    const blocks = page.blocks.map(b => `
      <article class="story-panel flow-panel">
        <h3 class="panel-title small">${esc(b.title)}</h3>
        <div class="panel-body">${b.content}</div>
      </article>
    `).join("");
    return `<div class="page-body"><div class="build-flow">${blocks}</div></div>`;
  }
  const cls = page.layout === "columns4" ? "build-grid-4" : page.layout === "columns3" ? "build-grid-3" : page.layout === "columns2" ? "build-grid-2" : "build-grid-hero";
  const blocks = page.blocks.map(b => `
    <article class="story-panel">
      <h3 class="panel-title">${esc(b.title)}</h3>
      <div class="panel-body">${b.content}</div>
    </article>
  `).join("");
  return `<div class="page-body"><div class="${cls}">${blocks}</div></div>`;
}

function renderItemContext(detail) {
  if (!detail) return "";
  const parts = [];
  if (detail.project) parts.push(`<span class="mini-context mini-context--project">${esc(detail.project)}</span>`);
  if (detail.org) parts.push(`<span class="mini-context">${esc(detail.org)}</span>`);
  if (detail.owner) parts.push(`<span class="mini-context">${esc(detail.owner)}</span>`);
  if (!parts.length) return "";
  return `<div class="item-context">${parts.join("")}</div>`;
}

function clickableWrap(inner, detail) {
  if (!detail) return inner;
  const key = stashDetail(detail);
  return `<button type="button" class="click-item" data-detail-key="${key}">${inner}</button>`;
}

function panelInner(panel) {
  switch(panel.type) {
    case "metrics":
      return `<div class="metric-strip">${panel.content.map((row,i)=> {
        const d = panel.details?.[i];
        return clickableWrap(`
          <div class="metric-box">
            ${renderItemContext(d)}
            <div class="metric-label">${esc(row[0])}</div>
            <div class="metric-value ${trendClass(row[1])}">${esc(row[1])}</div>
            <div class="metric-meta">${esc(row[2])}</div>
          </div>`, d);
      }).join("")}</div>`;
    case "rag":
      return `<div class="rag-list">${panel.content.map((row,i)=> {
        const d = panel.details?.[i];
        return clickableWrap(`
          <div class="rag-item">
            ${renderItemContext(d)}
            <div class="rag-top">
              <div class="rag-name">${esc(row[0])}</div>
              <span class="context-pill status ${row[2]==='Red'?'red':row[2]==='Amber'?'amber':'green'}">${esc(row[2])}</span>
            </div>
            <div class="rag-meta">${esc(row[1])} · ${row[2]==='Red'?'즉시 개입':row[2]==='Amber'?'경계 관리':'정상 범위'}</div>
          </div>`, d);
      }).join("")}</div>`;
    case "rank":
      return `<div class="rank-list">${panel.content.map((row,i)=> {
        const d = panel.details?.[i];
        return clickableWrap(`
          <div class="rank-item">
            ${renderItemContext(d)}
            <div class="rank-val ${trendClass(row[0])}">${esc(row[0])}</div>
            <div>
              <div class="rank-name">${esc(row[1])}</div>
              <div class="rank-note">${esc(row[2])}</div>
            </div>
          </div>`, d);
      }).join("")}</div>`;
    case "feed":
      return `<div class="feed-list">${panel.content.map((row,i)=> {
        const d = panel.details?.[i];
        return clickableWrap(`
          <div class="feed-item">
            ${renderItemContext(d)}
            <div class="feed-title">${esc(row[0])}</div>
            <div class="feed-body">${esc(row[1])}</div>
            <div class="feed-meta">${esc(row[2])}</div>
          </div>`, d);
      }).join("")}</div>`;
    case "table":
      return `<div class="table-wrap"><table><thead><tr>${panel.columns.map(c=>`<th>${esc(c)}</th>`).join("")}</tr></thead><tbody>${panel.content.map((r,i)=> {
        const d = panel.details?.[i];
        const rowHtml = `<tr>${r.map((c,j)=>`<td>${j===0 && d ? renderItemContext({project:d.project}) + esc(c) : esc(c)}</td>`).join("")}</tr>`;
        return d ? `<tr><td colspan="${panel.columns.length}" class="table-click-cell"><button type="button" class="click-item table-item-button" data-detail-key="${stashDetail(d)}"><table class="inner-table"><tbody>${rowHtml}</tbody></table></button></td></tr>` : rowHtml;
      }).join("")}</tbody></table></div>`;
    case "bullets":
      return `<ul class="bullet-list">${panel.content.map((v,i)=> {
        const d = panel.details?.[i];
        return d ? `<li><button type="button" class="click-item bullet-item" data-detail-key="${stashDetail(d)}">${esc(v)}</button></li>` : `<li>${esc(v)}</li>`;
      }).join("")}</ul>`;
    case "cards":
      return `<div class="card-stack">${panel.content.map((row,i)=> {
        const d = panel.details?.[i];
        return clickableWrap(`
          <div class="mini-card">
            ${renderItemContext(d)}
            <div class="mini-title">${esc(row[0])}</div>
            <div class="mini-body">${esc(row[1])}</div>
            <div class="mini-meta">${esc(row[2])}</div>
          </div>`, d);
      }).join("")}</div>`;
    case "bars":
      return `<div class="bar-list">${panel.content.map((row,i)=> {
        const d = panel.details?.[i];
        return clickableWrap(`
          <div class="bar-row">
            ${renderItemContext(d)}
            <div class="bar-meta"><span>${esc(row[0])}</span><strong>${esc(row[1])}</strong></div>
            <div class="bar-track"><div class="bar-fill ${trendClass(row[1])==='up'?'up':trendClass(row[1])==='down'?'down':''}" style="width:${Number(row[2])}%"></div></div>
          </div>`, d);
      }).join("")}</div>`;
    case "heat":
      return `<div class="heatmap">
        <div class="heat-row"><div class="heat-head"></div>${panel.columns.map(c=>`<div class="heat-head">${esc(c)}</div>`).join("")}</div>
        ${panel.rows.map((r,i)=> {
          const d = panel.details?.[i];
          const inner = `<div class="heat-row"><div class="heat-label">${esc(r[0])}</div>${r.slice(1).map(v=>`<div class="heat-cell ${v==='Red'?'red':v==='Amber'?'amber':'green'}">${esc(v)}</div>`).join("")}</div>`;
          return d ? clickableWrap(inner, d) : inner;
        }).join("")}
      </div>`;
    case "timeline":
      return `<div class="timeline-list">${panel.content.map((row,i)=> {
        const d = panel.details?.[i];
        return clickableWrap(`
          <div class="timeline-item">
            ${renderItemContext(d)}
            <div class="mini-title">${esc(row[0])}</div>
            <div class="timeline-body">${esc(row[1])}</div>
          </div>`, d);
      }).join("")}</div>`;
    case "alerts":
      return `<div class="alert-stack">${panel.content.map((row,i)=> {
        const d = panel.details?.[i];
        return clickableWrap(`
          <div class="alert-item">
            ${renderItemContext(d)}
            <div class="alert-title">${esc(row[0])}</div>
            <div class="alert-row"><strong>왜 떴는지</strong><span>${esc(row[1])}</span></div>
            <div class="alert-row"><strong>다음 액션</strong><span>${esc(row[2])}</span></div>
          </div>`, d);
      }).join("")}</div>`;
    case "graph":
      return renderGraph(panel.content, panel.details || []);
    default:
      return `<div class="panel-body">${panel.content || ""}</div>`;
  }
}

function renderPanel(panel) {
  return `<section class="data-panel">
    <div class="section-label">${esc(panel.title)}</div>
    <div class="panel-body-wrap">${panelInner(panel)}</div>
  </section>`;
}

function renderGraph(triples, details) {
  const persons = [...new Set(triples.map(t=>t[0]))];
  const projects = [...new Set(triples.map(t=>t[1]))];
  const parties = [...new Set(triples.map(t=>t[2]))];
  const pos = new Map();
  const width = 1000, height = 420;
  persons.forEach((n,i)=>pos.set("p:"+n,[120, 100 + i*140]));
  projects.forEach((n,i)=>pos.set("j:"+n,[500, 90 + i*140]));
  parties.forEach((n,i)=>pos.set("c:"+n,[850, 80 + i*110]));
  const lines = [];
  triples.forEach(t => {
    lines.push([pos.get("p:"+t[0]), pos.get("j:"+t[1])]);
    lines.push([pos.get("j:"+t[1]), pos.get("c:"+t[2])]);
  });
  return `<div class="graph-wrap">
    <div class="graph-help">사람 · 프로젝트 · 거래상대방 관계를 눌러 상세 정보를 볼 수 있습니다.</div>
    <svg class="graph-svg" viewBox="0 0 ${width} ${height}">
      ${lines.map(l=>`<line x1="${l[0][0]}" y1="${l[0][1]}" x2="${l[1][0]}" y2="${l[1][1]}" />`).join("")}
      ${persons.map(n=>`<g class="node-person node-click" data-tag-type="person" data-tag-value="${esc(n)}"><circle cx="${pos.get("p:"+n)[0]}" cy="${pos.get("p:"+n)[1]}" r="18"></circle><text x="${pos.get("p:"+n)[0]+30}" y="${pos.get("p:"+n)[1]+5}">${esc(n)}</text></g>`).join("")}
      ${projects.map(n=>`<g class="node-project node-click" data-tag-type="project" data-tag-value="${esc(project_alias(n))}"><circle cx="${pos.get("j:"+n)[0]}" cy="${pos.get("j:"+n)[1]}" r="18"></circle><text x="${pos.get("j:"+n)[0]+30}" y="${pos.get("j:"+n)[1]+5}">${esc(n)}</text></g>`).join("")}
      ${parties.map(n=>`<g class="node-party"><circle cx="${pos.get("c:"+n)[0]}" cy="${pos.get("c:"+n)[1]}" r="18"></circle><text x="${pos.get("c:"+n)[0]+30}" y="${pos.get("c:"+n)[1]+5}">${esc(n)}</text></g>`).join("")}
    </svg>
  </div>`;
}

function project_alias(name) {
  return projectProfiles[name] ? name : (projectProfiles["양지 물류센터"] ? name : name);
}

function renderHeroRow(page) {
  return `<div class="hero-row">${page.alerts.map((a, idx)=>`
    <article class="hero-card" data-alert="${idx}">
      ${renderContextBar(a)}
      <div class="hero-title"><strong>${esc(a.title)}</strong></div>
      <div class="hero-note">
        <span>${esc(a.note)}</span>
        <span class="trend ${trendClass(a.trend)}">${esc(a.trend)}</span>
      </div>
    </article>`).join("")}</div>`;
}

function renderSamplePage(page) {
  let core = "";
  let bottom = "";
  if (page.template === "dashboard" || page.template === "alert" || page.template === "graph" || page.template === "war") {
    const cls = page.template;
    core = `<div class="sample-grid ${cls}">
      <div>${(page.regions.left||[]).map(renderPanel).join("")}</div>
      <div>${(page.regions.center||[]).map(renderPanel).join("")}</div>
      <div>${(page.regions.right||[]).map(renderPanel).join("")}</div>
    </div>`;
    bottom = `<div class="bottom-grid two">${(page.regions.bottom||[]).map(renderPanel).join("")}</div>`;
  } else if (page.template === "compare") {
    core = `<div class="sample-grid compare">
      <div>${(page.regions.main||[]).map(renderPanel).join("")}</div>
      <div>${(page.regions.side||[]).map(renderPanel).join("")}</div>
    </div>`;
    bottom = `<div class="bottom-grid two">${(page.regions.bottom||[]).map(renderPanel).join("")}</div>`;
  }
  return `
    <div class="page-body">
      <div class="product-shell">
        ${renderHeroRow(page)}
        ${core}
        ${bottom}
      </div>
    </div>`;
}

function renderPage() {
  detailCounter = 0;
  for (const k in detailStore) delete detailStore[k];
  const page = deckData[state.index];
  const root = document.getElementById("pageRoot");
  root.className = "page page-fade";
  const body = page.kind === "build" ? renderBuildPage(page) : renderSamplePage(page);
  root.innerHTML = `
    ${renderPageHeader(page)}
    ${body}
    ${renderFooterNav()}
  `;
  document.getElementById("topMetaCounter").textContent = `${String(state.index+1).padStart(2,'0')} / ${String(deckData.length).padStart(2,'0')}`;
  renderSectionTabs();
  bindPageInteractions(page);
  root.querySelector("#prevBtn").onclick = () => goTo(state.index - 1);
  root.querySelector("#nextBtn").onclick = () => goTo(state.index + 1);
  root.querySelectorAll("[data-dot]").forEach(el => el.onclick = () => goTo(Number(el.dataset.dot)));
}

function bindPageInteractions(page) {
  const root = document.getElementById("pageRoot");
  root.onclick = (e) => {
    const tag = e.target.closest("[data-tag-type]");
    if (tag) {
      e.stopPropagation();
      openEntityModal(tag.dataset.tagType, tag.dataset.tagValue);
      return;
    }
    const item = e.target.closest("[data-detail-key]");
    if (item) {
      e.stopPropagation();
      const detail = detailStore[item.dataset.detailKey];
      if (detail) openDetailModal(detail);
      return;
    }
    const hero = e.target.closest(".hero-card");
    if (hero) {
      const alert = page.alerts[Number(hero.dataset.alert)];
      openAlertModal(alert);
    }
  };
}

function renderProfileTags(entityType, value, extra) {
  const tags = [];
  if (entityType === "project") {
    tags.push(renderTag("project", value));
  } else if (entityType === "org") {
    tags.push(renderTag("org", value));
  } else if (entityType === "person") {
    tags.push(renderTag("person", value));
  }
  if (extra) tags.push(`<span class="project-tag muted">${esc(extra)}</span>`);
  return tags.join("");
}

function tableFromPairs(pairs) {
  return `<div class="mini-table">${pairs.map(([k,v])=>`<div class="mini-row"><div class="mini-key">${esc(k)}</div><div class="mini-value">${esc(v)}</div></div>`).join("")}</div>`;
}

function openAlertModal(alert) {
  document.getElementById("modalTags").innerHTML = `
    ${renderTag("project", alert.project)}
    ${splitOrgTags(alert.org || "").map(org => renderTag("org", org)).join("")}
    ${alert.owner && alert.owner !== "공백" ? renderTag("person", alert.owner) : `<span class="project-tag muted">담당 공백</span>`}
    <span class="project-tag muted">${esc(alert.status)}</span>
  `;
  document.getElementById("modalTitle").textContent = alert.title;
  document.getElementById("modalSub").textContent = alert.note;
  document.getElementById("modalBody").innerHTML = `
    <div class="detail-grid detail-grid--stack">
      <section class="detail-block">
        <h4>왜 중요합니까</h4>
        <ul>${(alert.details || []).map(d=>`<li>${esc(d)}</li>`).join("")}</ul>
      </section>
      <section class="detail-block">
        <h4>이 이슈가 생긴 배경</h4>
        <ul>${(alert.history || []).map(d=>`<li>${esc(d)}</li>`).join("")}</ul>
      </section>
      <section class="detail-block detail-block--two">
        <div>
          <h4>연결 정보</h4>
          <ul>${(alert.related || []).map(d=>`<li>${esc(d)}</li>`).join("")}</ul>
        </div>
        <div>
          <h4>지금 확인할 것</h4>
          <ul>${(alert.checks || []).map(d=>`<li>${esc(d)}</li>`).join("")}</ul>
        </div>
      </section>
    </div>
  `;
  document.getElementById("modal").classList.add("open");
}

    ${detail.project ? renderTag("project", detail.project) : ""}
    ${detail.org ? renderTag("org", detail.org) : ""}
    ${detail.owner ? renderTag("person", detail.owner) : ""}

  document.getElementById("modalSub").textContent = detail.summary || "";
  document.getElementById("modalBody").innerHTML = `
    <div class="detail-grid detail-grid--stack">
      <section class="detail-block">
        <h4>왜 이 항목을 봐야 합니까</h4>
        <ul>${(detail.why || []).map(d=>`<li>${esc(d)}</li>`).join("")}</ul>
      </section>
      <section class="detail-block">
        <h4>히스토리와 배경</h4>
        <ul>${(detail.history || []).map(d=>`<li>${esc(d)}</li>`).join("")}</ul>
      </section>
      <section class="detail-block detail-block--two">
        <div>
          <h4>연결 정보</h4>
          <ul>${(detail.related || []).map(d=>`<li>${esc(d)}</li>`).join("")}</ul>
        </div>
        <div>
          <h4>추가 확인 및 액션</h4>
          <ul>${(detail.actions || []).concat(detail.checks || []).map(d=>`<li>${esc(d)}</li>`).join("")}</ul>

}

function openOrgModal(name) {

  document.getElementById("modalTitle").textContent = name;

  document.getElementById("modalBody").innerHTML = `
    <div class="detail-grid detail-grid--stack">
      <section class="detail-block detail-block--two">
        <div>
          <h4>조직 구성</h4>
          <p>${esc(o.composition || "")}</p>
        </div>
        <div>
          <h4>올해 예상 보수</h4>
          <p>${esc(o.fees || "")}</p>
        </div>
      </section>
      <section class="detail-block">
        <h4>현재 진행 중인 프로젝트</h4>
        <div class="tag-list">${(o.projects || []).map(p=>renderTag("project", p)).join("")}</div>
      </section>
      <section class="detail-block">
        <h4>현재 집중 과제</h4>
        <p>${esc(o.focus || "")}</p>
      </section>
    </div>`;
  document.getElementById("modal").classList.add("open");
}

function openPersonModal(name) {
  const p = peopleProfiles[name];
  if (!p) return;
  document.getElementById("modalTags").innerHTML = `${renderTag("person", name)}${p.org ? renderTag("org", p.org) : ""}`;
  document.getElementById("modalTitle").textContent = name;
  document.getElementById("modalSub").textContent = "소속, 경력, 입사 시점, 참여 프로젝트를 보는 샘플 팝업입니다.";
  document.getElementById("modalBody").innerHTML = `
    <div class="detail-grid detail-grid--stack">
      <section class="detail-block detail-block--two">
        <div>
          <h4>기본 정보</h4>
          ${tableFromPairs([["소속", p.org], ["직급", p.title], ["연차", p.years], ["IGIS 입사", p.joined]])}
        </div>
        <div>
          <h4>전문 영역</h4>
          <p>${esc(p.specialty || "")}</p>
          <div class="tag-list">${(p.counterparties || []).map(v=>`<span class="project-tag muted">${esc(v)}</span>`).join("")}</div>
        </div>
      </section>
      <section class="detail-block">
        <h4>참여 프로젝트</h4>
        <div class="tag-list">${(p.projects || []).map(v=>renderTag("project", v)).join("")}</div>
      </section>
    </div>`;
  document.getElementById("modal").classList.add("open");
}

function openEntityModal(type, value) {
  if (type === "project") return openProjectModal(value);
  if (type === "org") return openOrgModal(value);
  if (type === "person") return openPersonModal(value);
}

function closeModal() {
  document.getElementById("modal").classList.remove("open");
}

function goTo(index) {
  if (index < 0) index = deckData.length - 1;
  if (index >= deckData.length) index = 0;
  state.index = index;
  history.replaceState(null, "", `#${deckData[index].id}`);
  renderPage();
}

function syncHash() {
  const hash = location.hash.replace("#","");
  const idx = deckData.findIndex(p => p.id === hash);
  state.index = idx >= 0 ? idx : 0;
}

document.getElementById("modalClose").addEventListener("click", closeModal);
document.getElementById("modal").addEventListener("click", (e) => {
  if (e.target.id === "modal") closeModal();
});
window.addEventListener("keydown", (e) => {
  if (document.getElementById("modal").classList.contains("open") && e.key === "Escape") return closeModal();
  if (e.key === "ArrowRight") goTo(state.index + 1);
  if (e.key === "ArrowLeft") goTo(state.index - 1);
});
window.addEventListener("hashchange", () => { syncHash(); renderPage(); });

syncHash();
renderPage();

</script>
</body>
</html>
